<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080c14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FiberHome">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>FiberHome LAGHOUAT DZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:      #080c14;
    --surf:    #0d1117;
    --surf2:   #161b22;
    --border:  #21262d;
    --accent:  #00ff88;
    --adim:    rgba(0,255,136,.08);
    --aglow:   0 0 28px rgba(0,255,136,.22);
    --blue:    #58a6ff;
    --orange:  #ffa657;
    --red:     #ff6b6b;
    --text:    #e6edf3;
    --muted:   #7d8590;
    --font:    'JetBrains Mono', 'Courier New', monospace;
    --r:       14px;
    --rsm:     9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 16px 60px;
}
body::before{
    content:'';
    position:fixed;inset:0;
    background-image:
        linear-gradient(rgba(0,255,136,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,255,136,.025) 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;z-index:0;
}
.app{width:100%;max-width:460px;position:relative;z-index:1;}

/* HEADER */
header{text-align:center;padding:32px 0 24px;}
.logo-wrap{
    display:inline-flex;align-items:center;justify-content:center;
    width:68px;height:68px;
    background:var(--adim);
    border:1px solid rgba(0,255,136,.18);
    border-radius:18px;margin-bottom:14px;
    box-shadow:var(--aglow);
}
.logo-wrap svg{width:40px;height:40px;}
h1{font-size:22px;font-weight:700;letter-spacing:-.5px;}
h1 span{color:var(--accent);}
.subtitle{font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:2.5px;text-transform:uppercase;}

/* CARDS */
.card{
    background:var(--surf);
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:20px;margin-bottom:12px;
}

/* SWITCH */
.mode-switch{
    display:flex;
    background:var(--surf2);
    border:1px solid var(--border);
    border-radius:var(--rsm);
    padding:4px;margin-bottom:18px;gap:4px;
}
.mode-btn{
    flex:1;background:none;border:none;
    border-radius:6px;
    color:var(--muted);
    font-family:var(--font);font-size:11px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;
    padding:11px 8px;cursor:pointer;
    transition:all .2s;
    display:flex;align-items:center;justify-content:center;gap:6px;
}
.mode-btn.active{
    background:var(--adim);
    color:var(--accent);
    border:1px solid rgba(0,255,136,.2);
    box-shadow:0 0 12px rgba(0,255,136,.1);
}

/* INPUT */
.field-label{
    display:block;font-size:10px;font-weight:700;
    color:var(--muted);letter-spacing:1.5px;
    text-transform:uppercase;margin-bottom:10px;
}
.input-wrap{position:relative;}
.prefix{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:14px;font-weight:700;color:var(--accent);
    pointer-events:none;display:none;
    letter-spacing:1px;
}
.prefix.show{display:block;}
input[type="text"]{
    width:100%;
    background:var(--surf2);
    border:1px solid var(--border);
    border-radius:var(--rsm);
    color:var(--text);
    font-family:var(--font);font-size:14px;
    padding:14px 16px;
    outline:none;
    transition:border-color .2s,box-shadow .2s;
}
input.has-prefix{padding-left:46px;}
input:focus{
    border-color:rgba(0,255,136,.35);
    box-shadow:0 0 0 3px rgba(0,255,136,.07);
}
input[readonly]{color:var(--accent);font-weight:600;cursor:text;}
input.err{border-color:rgba(255,107,107,.5)!important;box-shadow:0 0 0 3px rgba(255,107,107,.08)!important;}

/* MAC PROGRESS DOTS */
.mac-progress{
    display:flex;gap:5px;margin-top:10px;justify-content:center;
}
.mac-dot{
    width:20px;height:4px;
    background:var(--border);border-radius:2px;
    transition:background .15s;
}
.mac-dot.filled{background:var(--accent);}
.mac-dot.active{background:rgba(0,255,136,.4);}

/* SCAN BTN */
.btn-scan{
    width:100%;margin-top:10px;
    background:none;
    border:1px solid rgba(0,255,136,.25);
    border-radius:var(--rsm);
    color:var(--accent);
    font-family:var(--font);font-size:12px;font-weight:700;
    padding:12px;cursor:pointer;
    letter-spacing:1px;text-transform:uppercase;
    transition:all .2s;display:none;
    align-items:center;justify-content:center;gap:8px;
}
.btn-scan:hover{background:var(--adim);}
.btn-scan.show{display:flex;}
.btn-scan.scanning{opacity:.6;pointer-events:none;}

/* WIFI LIST */
.wifi-list{
    margin-top:10px;display:none;
    flex-direction:column;gap:6px;
}
.wifi-list.show{display:flex;}
.wifi-item{
    background:var(--surf2);border:1px solid var(--border);
    border-radius:var(--rsm);padding:11px 14px;
    cursor:pointer;transition:border-color .2s;
    display:flex;align-items:center;justify-content:space-between;
}
.wifi-item:hover{border-color:var(--accent);}
.wi-ssid{font-size:13px;font-weight:600;color:var(--text);}
.wi-signal{font-size:10px;color:var(--muted);}

/* CONNECT BTN */
.btn-connect{
    width:100%;margin-top:10px;
    background:var(--surf2);
    border:1px solid rgba(88,166,255,.3);
    border-radius:var(--rsm);
    color:var(--blue);
    font-family:var(--font);font-size:12px;font-weight:700;
    padding:13px;cursor:pointer;
    letter-spacing:1px;text-transform:uppercase;
    transition:all .2s;display:none;
    align-items:center;justify-content:center;gap:8px;
}
.btn-connect.show{display:flex;}
.btn-connect:hover{background:rgba(88,166,255,.08);}
.btn-connect.connecting{opacity:.6;pointer-events:none;}

/* GENERATE BTN */
.btn-gen{
    width:100%;margin-top:16px;
    background:var(--accent);color:#000;
    border:none;border-radius:var(--rsm);
    font-family:var(--font);font-size:13px;font-weight:700;
    padding:15px;cursor:pointer;
    letter-spacing:1.5px;text-transform:uppercase;
    transition:opacity .15s,transform .1s,box-shadow .2s;
    position:relative;overflow:hidden;
}
.btn-gen:hover{box-shadow:var(--aglow);}
.btn-gen:active{transform:scale(.98);}
.btn-gen:disabled{opacity:.5;cursor:default;}
.btn-gen .ripple{
    position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
    transform:translateX(-100%);
}
.btn-gen.loading .ripple{animation:sweep .45s ease-out;}
@keyframes sweep{to{transform:translateX(100%);}}

/* RESULT */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.result-type{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.result-type.admin{color:var(--blue);}
.result-type.wifi{color:var(--orange);}
.result-row{display:flex;gap:8px;align-items:center;}
.result-row input{flex:1;min-width:0;}
.btn-copy{
    background:var(--surf2);border:1px solid var(--border);
    border-radius:var(--rsm);color:var(--muted);
    font-family:var(--font);font-size:11px;font-weight:700;
    padding:14px 11px;cursor:pointer;
    transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.btn-copy:hover{border-color:var(--accent);color:var(--accent);}
.btn-copy.ok{border-color:var(--accent);color:var(--accent);background:var(--adim);}

/* HISTORY */
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.btn-clear{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:10px;letter-spacing:1px;cursor:pointer;transition:color .15s;}
.btn-clear:hover{color:var(--red);}
.hist-list{list-style:none;display:flex;flex-direction:column;gap:7px;}
.hist-item{
    background:var(--surf2);border:1px solid var(--border);
    border-radius:var(--rsm);padding:10px 13px;
    cursor:pointer;transition:border-color .2s;
    display:flex;justify-content:space-between;align-items:center;gap:6px;
}
.hist-item:hover{border-color:rgba(0,255,136,.2);}
.hi-inp{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44%;}
.hi-arr{font-size:12px;color:var(--border);flex-shrink:0;}
.hi-res{font-size:12px;color:var(--accent);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44%;text-align:right;}

/* INSTALL */
.btn-install{
    position:fixed;bottom:18px;right:14px;
    background:var(--surf);border:1px solid rgba(0,255,136,.3);
    border-radius:24px;color:var(--accent);
    font-family:var(--font);font-size:12px;font-weight:700;
    padding:10px 18px;cursor:pointer;
    box-shadow:0 4px 24px rgba(0,0,0,.5),var(--aglow);
    z-index:100;transition:all .2s;
}
footer{text-align:center;padding:20px 0 0;font-size:10px;color:var(--border);letter-spacing:2px;}
.hidden{display:none!important;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fadein{animation:fadeUp .3s ease-out;}
</style>
</head>
<body>
<div class="app">

<header>
    <div class="logo-wrap">
        <svg viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="29" r="3.5" fill="#00ff88"/>
            <path d="M12 22.5Q20 18 28 22.5" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M6 16.5Q20 10 34 16.5" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".65"/>
            <path d="M1 10.5Q20 2 39 10.5" stroke="#00ff88" stroke-width="2.5" stroke-linecap="round" fill="none" opacity=".3"/>
        </svg>
    </div>
    <h1>Fiber<span>Home</span></h1>
    <p class="subtitle">LAGHOUAT DZ &bull; v1.1</p>

<div class="card">
    <!-- Mode Switch -->
    <div class="mode-switch">
        <button class="mode-btn active" id="btn-mac" onclick="setMode('mac')">
            🖥 MAC Address
        </button>
        <button class="mode-btn" id="btn-ssid" onclick="setMode('ssid')">

<!-- Result -->
<div class="card fadein hidden" id="result-card">
    <div class="result-header">
        <span class="result-type" id="result-type"></span>
    </div>
    <div class="result-row">
        <input type="text" id="result-field" readonly>
        <button class="btn-copy" id="copy-btn" onclick="copyResult()">📋 COPY</button>
    </div>
    <button class="btn-connect" id="connect-btn" onclick="connectWifi()">
        📶 Connect to WiFi
    </button>
</div>

<!-- History -->
<div class="card hidden" id="hist-card">
    <div class="history-header">
        <span class="field-label" style="margin:0">History</span>
        <button class="btn-clear" onclick="clearHistory()">✕ CLEAR</button>
    </div>
    <ul class="hist-list" id="hist-list"></ul>
</div>

<footer>LAGHOUAT DZ &bull; FIBERHOME PASSWORD TOOL</footer>
</div>

<button class="btn-install hidden" id="install-btn" onclick="installPWA()">📲 Install App</button>

<script>

/* ALGORITHMS */
const UPPER="ACDFGHJMNPRSTUWXY",LOWER="abcdfghjkmpstuwxy",DIGIT="2345679",SYMBOL="!@$&%";
const SSID_MAP={a:'5',b:'4',c:'3',d:'2',e:'1',f:'0','0':'f','1':'e','2':'d','3':'c','4':'b','5':'a','6':'9','7':'8','8':'7','9':'6'};

function macToAdmin(mac){
    if(!/^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$/.test(mac))return null;
    const digest=md5(mac+'AEJLY');
    const vals=[...digest.slice(0,20)].map(c=>parseInt(c,16));
    const pw=new Array(16).fill('');
    for(let i=0;i<16;i++){const v=vals[i],t=v%4;if(t===0)pw[i]=UPPER[(v*2)%17];else if(t===1)pw[i]=LOWER[(v*2+1)%17];else if(t===2)pw[i]=DIGIT[6-(v%7)];else pw[i]=SYMBOL[4-(v%5)];}
    const used=new Set();
    for(let i=16;i<20;i++){let p=(vals[i]+1)%16;while(used.has(p))p=(p+1)%16;used.add(p);if(i===16)pw[p]=UPPER[(vals[i]*2)%17];else if(i===17)pw[p]=LOWER[(vals[i]*2+1)%17];else if(i===18)pw[p]=DIGIT[6-(vals[i]%7)];else pw[p]=SYMBOL[4-(vals[i]%5)];}
    return pw.join('');
}
function ssidToWifi(ssid){
    const m=ssid.toLowerCase().match(/^fh_([0-9a-f]{6})(?:_5g)?$/);
    if(!m)return null;
    return 'wlan'+[...m[1]].map(c=>SSID_MAP[c]).join('');
}

/* MODE SWITCH */
let currentMode='mac';
function setMode(mode){
    currentMode=mode;
    const inp=document.getElementById('inp');
    const prefix=document.getElementById('prefix');
    document.getElementById('btn-mac').className='mode-btn'+(mode==='mac'?' active':'');
    document.getElementById('btn-ssid').className='mode-btn'+(mode==='ssid'?' active':'');
    inp.value='';
    document.getElementById('result-card').classList.add('hidden');
    if(mode==='mac'){
        document.getElementById('field-label').textContent='MAC Address';
        inp.placeholder='AA:BB:CC:DD:EE:FF';
        inp.maxLength=17;
        inp.classList.remove('has-prefix');
        prefix.classList.remove('show');
        document.getElementById('mac-progress').classList.remove('hidden');
        document.getElementById('btn-scan').classList.remove('show');
        document.getElementById('wifi-list').classList.remove('show');
        updateDots('');
    } else {
        document.getElementById('field-label').textContent='SSID';
        inp.placeholder='7baaaa';
        inp.maxLength=9;
        inp.classList.add('has-prefix');
        prefix.classList.add('show');
        document.getElementById('mac-progress').classList.add('hidden');
        document.getElementById('btn-scan').classList.add('show');
        lastScannedSSID=null;
    }
    inp.focus();
}

/* MAC AUTO-FORMAT */
function onInput(){
    if(currentMode!=='mac')return;
    const inp=document.getElementById('inp');
    const pos=inp.selectionStart;
    let raw=inp.value.replace(/[^0-9A-Fa-f]/g,'').toUpperCase().slice(0,12);
    let fmt='';
    for(let i=0;i<raw.length;i++){if(i>0&&i%2===0)fmt+=':';fmt+=raw[i];}
    inp.value=fmt;
    // restore cursor
    let extra=fmt.slice(0,pos).split(':').length-1;
    inp.setSelectionRange(pos+extra,pos+extra);
    updateDots(fmt);
}
function updateDots(val){
    const pairs=val.replace(/:/g,'').length;
    for(let i=0;i<6;i++){
        const dot=document.getElementById('d'+i);
        const done=pairs>=(i+1)*2;
        const curr=pairs>i*2&&pairs<(i+1)*2;
        dot.className='mac-dot'+(done?' filled':curr?' active':'');
    }
}

/* GENERATE */
let lastScannedSSID = null;
let lastPassword = null;

function generate(){
    const inp=document.getElementById('inp');
    const btn=document.getElementById('btn');
    const val=inp.value.trim();
    if(!val){inp.focus();return;}
    let label,typeClass,result,histKey;
    if(currentMode==='mac'){
        if(!/^([0-9A-Fa-f]{2}:){5}[0-9A-Fa-f]{2}$/.test(val)){
            inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),1600);return;
        }
        label='Admin Password';typeClass='admin';result=macToAdmin(val);histKey=val;
    } else {
        const full='fh_'+val;
        result=ssidToWifi(full);
        if(!result){inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),1600);return;}
        label='WiFi Password';typeClass='wifi';histKey=full;
        lastPassword=result;
        if(!lastScannedSSID)lastScannedSSID=full;
    }
    btn.classList.add('loading');btn.disabled=true;
    setTimeout(()=>{
        btn.classList.remove('loading');btn.disabled=false;
        const card=document.getElementById('result-card');
        document.getElementById('result-type').textContent=label;
        document.getElementById('result-type').className='result-type '+typeClass;
        document.getElementById('result-field').value=result;
        document.getElementById('copy-btn').textContent='📋 COPY';
        document.getElementById('copy-btn').className='btn-copy';
        // Show connect button only in SSID mode
        const connectBtn=document.getElementById('connect-btn');
        if(currentMode==='ssid'){connectBtn.classList.add('show');connectBtn.textContent='📶 Connect to WiFi';connectBtn.style.color='';connectBtn.style.borderColor='';}
        else connectBtn.classList.remove('show');
        card.classList.remove('hidden');
        void card.offsetWidth;card.classList.add('fadein');
        saveHist(histKey,result);
    },150);
}

/* COPY */
function copyResult(){
    const val=document.getElementById('result-field').value;
    if(!val)return;
    const btn=document.getElementById('copy-btn');
    const done=()=>{btn.textContent='✓ COPIED';btn.className='btn-copy ok';setTimeout(()=>{btn.textContent='📋 COPY';btn.className='btn-copy';},2200);};
    if(navigator.clipboard)navigator.clipboard.writeText(val).then(done);
    else{const t=document.createElement('textarea');t.value=val;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);done();}
}

/* HISTORY */
function getHist(){try{return JSON.parse(localStorage.getItem('fh_hist')||'[]');}catch{return[];}}
function saveHist(inp,res){const h=getHist().filter(x=>x.inp!==inp);h.unshift({inp,res});if(h.length>7)h.pop();localStorage.setItem('fh_hist',JSON.stringify(h));renderHist();}
function clearHistory(){localStorage.removeItem('fh_hist');renderHist();}
function renderHist(){
    const h=getHist();const card=document.getElementById('hist-card');const list=document.getElementById('hist-list');
    if(!h.length){card.classList.add('hidden');return;}
    card.classList.remove('hidden');
    list.innerHTML=h.map((item,i)=>`<li class="hist-item" data-idx="${i}"><span class="hi-inp">${item.inp}</span><span class="hi-arr">→</span><span class="hi-res">${item.res}</span></li>`).join('');
}
document.getElementById('hist-list').addEventListener('click',e=>{
    const li=e.target.closest('.hist-item');if(!li)return;
    const item=getHist()[+li.dataset.idx];if(!item)return;
    if(item.inp.startsWith('fh_')){setMode('ssid');document.getElementById('inp').value=item.inp.replace('fh_','');}
    else{setMode('mac');document.getElementById('inp').value=item.inp;updateDots(item.inp);}
    generate();
});

/* EVENTS */
document.getElementById('inp').addEventListener('input',onInput);
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')generate();});

/* INIT */
renderHist();setMode('mac');

/* WIFI SCAN & CONNECT */
function isCapacitor(){return window.Capacitor&&window.Capacitor.isNativePlatform();}

async function scanWifi(){
    const btn=document.getElementById('btn-scan');
    const list=document.getElementById('wifi-list');
    btn.classList.add('scanning');
    btn.innerHTML='⏳ Scanning...';
    list.classList.remove('show');
    if(!isCapacitor()){
        // Demo for browser
        showWifiList([{ssid:'fh_7baaaa',signal:-55},{ssid:'fh_3c2d1e',signal:-70},{ssid:'fh_a1b2c3_5g',signal:-65}]);
        btn.classList.remove('scanning');btn.innerHTML='📡 Scan FiberHome Networks';
        return;
    }
    try{
        const {WifiPlugin}=window.Capacitor.Plugins;
        const result=await WifiPlugin.scanNetworks();
        showWifiList(result.networks||[]);
    }catch(e){alert('Scan failed: '+e.message);}
    finally{btn.classList.remove('scanning');btn.innerHTML='📡 Scan FiberHome Networks';}
}

function showWifiList(networks){
    const list=document.getElementById('wifi-list');
    if(!networks.length){
        list.innerHTML='<div style="text-align:center;color:var(--muted);font-size:12px;padding:10px">No FiberHome networks found</div>';
        list.classList.add('show');return;
    }
    networks.sort((a,b)=>b.signal-a.signal);
    list.innerHTML=networks.map(n=>{
        const bars=n.signal>-60?'▂▄▆█':n.signal>-75?'▂▄▆_':'▂▄__';
        return`<div class="wifi-item" onclick="selectWifi('${n.ssid}')"><span class="wi-ssid">${n.ssid}</span><span class="wi-signal">${bars}</span></div>`;
    }).join('');
    list.classList.add('show');
}

function selectWifi(ssid){
    lastScannedSSID=ssid;
    document.getElementById('inp').value=ssid.replace(/^fh_/i,'');
    document.getElementById('wifi-list').classList.remove('show');
    generate();
}

async function connectWifi(){
    if(!lastScannedSSID||!lastPassword)return;
    const btn=document.getElementById('connect-btn');
    if(!isCapacitor()){alert('Connect only works in APK');return;}
    btn.classList.add('connecting');btn.textContent='⏳ Connecting...';
    try{
        const {WifiPlugin}=window.Capacitor.Plugins;
        await WifiPlugin.connectToNetwork({ssid:lastScannedSSID,password:lastPassword});
        btn.textContent='✅ Connected!';
        btn.style.color='var(--accent)';btn.style.borderColor='rgba(0,255,136,.3)';
    }catch(e){
        btn.textContent='❌ Failed — try manually';
        btn.classList.remove('connecting');
    }
}

/* PWA */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-btn').classList.remove('hidden');});
window.addEventListener('appinstalled',()=>{document.getElementById('install-btn').classList.add('hidden');deferredPrompt=null;});
function installPWA(){if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-btn').classList.add('hidden');});}

if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.error));
</script>
